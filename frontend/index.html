<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Dev Card Generator</title>
  <meta name="description" content="Generate a beautiful AI-powered GitHub developer card from any public username." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --accent: #58a6ff; --green: #3fb950;
      --text1: #e6edf3; --text2: #8b949e; --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1rem 5rem;
    }

    /* ── Header ── */
    .hero { text-align: center; margin-bottom: 2.5rem; }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 800;
      background: linear-gradient(135deg, #58a6ff 0%, #3fb950 60%, #a371f7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.15; margin-bottom: .6rem;
    }
    .hero p { color: var(--text2); font-size: 1rem; max-width: 420px; margin: 0 auto; line-height: 1.6; }

    /* ── Search ── */
    #search-form {
      display: flex; gap: .6rem;
      width: 100%; max-width: 500px; margin-bottom: 2.5rem;
    }
    #username-input {
      flex: 1; padding: .8rem 1.1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text1); font-size: 1rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    #username-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.15); }
    #generate-btn {
      padding: .8rem 1.5rem; background: var(--accent); color: #fff;
      font-weight: 700; border: none; border-radius: var(--radius);
      cursor: pointer; font-size: 1rem; font-family: inherit;
      position: relative; overflow: hidden; transition: opacity .2s, transform .15s;
      white-space: nowrap;
    }
    #generate-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      transform: translateX(-100%); transition: transform .4s;
    }
    #generate-btn:hover::after { transform: translateX(100%); }
    #generate-btn:hover { opacity: .9; }
    #generate-btn:active { transform: scale(.97); }
    #generate-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Status ── */
    #status { font-size: .88rem; color: var(--text2); margin-bottom: 1.2rem; min-height: 1.2rem; transition: color .2s; }
    #status.error { color: #f85149; }
    #status.loading { color: var(--accent); }

    /* ── Skeleton ── */
    .skeleton-wrap { width: 100%; max-width: 680px; }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Card wrapper ── */
    #card-container { width: 100%; max-width: 680px; }

    /* ── Card iframe ── */
    .card-frame-wrap {
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.5);
      animation: fadeUp .45s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    #card-iframe { width: 100%; border: none; min-height: 460px; display: block; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: .6rem; margin-top: .9rem; flex-wrap: wrap;
    }
    .action-btn {
      display: flex; align-items: center; gap: .4rem;
      padding: .55rem 1rem; border-radius: 8px; font-size: .85rem;
      font-family: inherit; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text1); transition: border-color .2s, background .2s, transform .15s;
      text-decoration: none;
    }
    .action-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .action-btn:active { transform: scale(.96); }
    .action-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── Spinner inside button ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="hero">
    <h1>GitHub Dev Card Generator</h1>
    <p>Drop any public GitHub username and get an AI-powered, themed developer card in seconds.</p>
  </div>

  <form id="search-form" onsubmit="handleSubmit(event)">
    <input id="username-input" type="text" placeholder="e.g. torvalds" autocomplete="off" spellcheck="false" required />
    <button id="generate-btn" type="submit">Generate</button>
  </form>

  <div id="status" role="status" aria-live="polite"></div>
  <div id="card-container"></div>

  <script>
    // Backend URL — points to Cloud Run backend service
    const API_BASE = "https://github-card-backend-675769433571.us-central1.run.app";

    let currentUsername = "";

    async function handleSubmit(e, forceRefresh = false) {
      if (e) e.preventDefault();
      const username = document.getElementById("username-input").value.trim();
      if (!username) return;
      currentUsername = username;

      setStatus(forceRefresh ? "🔄 Fetching fresh GitHub data..." : "⏳ Fetching GitHub data and generating your card…", "loading");
      setLoading(true);
      showSkeleton();

      try {
        const res = await fetch(`${API_BASE}/generate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, force_refresh: forceRefresh }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        renderCard(data.card_url, username);
        setStatus("", "");
      } catch (err) {
        setStatus(`Error: ${err.message}`, "error");
        document.getElementById("card-container").innerHTML = "";
      } finally {
        setLoading(false);
      }
    }

    function setStatus(msg, cls) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = cls;
    }

    function setLoading(on) {
      const btn = document.getElementById("generate-btn");
      btn.disabled = on;
      btn.innerHTML = on
        ? `<span class="spinner"></span>Generating…`
        : "Generate";
    }

    function showSkeleton() {
      document.getElementById("card-container").innerHTML = `
        <div class="skeleton-wrap">
          <div class="skeleton" style="height:460px"></div>
        </div>`;
    }

    function renderCard(cardUrl, username) {
      const fullUrl = `${API_BASE}${cardUrl}`;
      document.getElementById("card-container").innerHTML = `
        <div class="card-frame-wrap">
          <iframe id="card-iframe" src="${fullUrl}"
            title="Dev card for ${username}"
            onload="resizeIframe(this)">
          </iframe>
        </div>
        <div class="action-bar">
          <button class="action-btn" id="copy-btn" onclick="copyLink('${fullUrl}')">
            📋 Copy Card Link
          </button>
          <a class="action-btn" id="open-btn" href="${fullUrl}" target="_blank" rel="noopener">
            🔗 Open in New Tab
          </a>
          <button class="action-btn" id="regen-btn" onclick="handleSubmit(null, true)">
            🔄 Regenerate
          </button>
        </div>`;
    }

    function resizeIframe(iframe) {
      try {
        const h = iframe.contentWindow.document.body.scrollHeight;
        if (h > 100) iframe.style.height = h + "px";
      } catch (_) { /* cross-origin — leave min-height */ }
    }

    async function copyLink(url) {
      const btn = document.getElementById("copy-btn");
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = "✅ Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "📋 Copy Card Link";
          btn.classList.remove("copied");
        }, 2000);
      } catch (_) {
        btn.textContent = "❌ Copy failed";
      }
    }
  </script>
</body>
</html>
